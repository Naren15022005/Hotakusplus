version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotakusplus-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hotakusplus
      POSTGRES_USER: hotakus
      POSTGRES_PASSWORD: hotakus123
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hotakusplus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
